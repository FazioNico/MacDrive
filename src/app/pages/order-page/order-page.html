<a routerLink="/admin">go to admin</a>

<div>
  <h1>Categories</h1>
  <ul>
    @for (category of categories();let i = $index; track i) {
      <li>{{ category.title }}</li>
    }
  </ul>
</div>

<div>
  <h1>Recipes</h1>
  @for (category of categories(); track category.uuid) {
    <ul>
      @for (recipe of category.recipes; track recipe.uuid) {
        <li (click)="addRecipe(recipe.uuid)">
          {{ recipe.title }} - {{ recipe.price }}
        </li>
      }
    </ul>
  }
</div>

<div>
  <button>Order Now</button>
</div>
